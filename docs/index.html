<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dario — ML Engineer</title>
<link rel="icon" href="https://avatars.githubusercontent.com/u/51273483?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>
<div id="top" style="--accent:#3563A8; --accent-2:#3E8A6E; cursor:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2232%22%20height%3D%2232%22%3E%3Ctext%20x%3D%223%22%20y%3D%2225%22%20font-family%3D%22sans-serif%22%20font-weight%3D%22900%22%20font-size%3D%2226%22%20fill%3D%22%233563A8%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%221%22%3E%E3%81%A0%3C%2Ftext%3E%3C%2Fsvg%3E)%206%206%2C%20auto; font-family:'Zen Kaku Gothic New',sans-serif; color:#232733; background:#F5F6F8; -webkit-font-smoothing:antialiased; overflow-x:hidden;">

  <nav id="nav" style="position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:15px clamp(18px,5vw,56px);backdrop-filter:blur(10px);background:rgba(245,246,248,0.72);border-bottom:1px solid rgba(35,39,51,0.08);"></nav>

  <!-- ================= HERO ================= -->
  <section style="position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:80px 20px 60px;background:radial-gradient(125% 95% at 50% 12%, #FCFCFD 0%, #F5F6F8 44%, #E9ECF1 100%);">
    <canvas id="kanji-field" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
    <div id="intro-veil" style="position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;pointer-events:none;background:#F5F6F8;animation:introVeil 2.3s ease forwards;">
      <div style="text-align:center;animation:introWord 2.3s cubic-bezier(.18,.75,.2,1) forwards;">
        <div id="intro1" style="font-family:'Luckiest Guy',cursive;font-size:clamp(26px,5vw,60px);letter-spacing:0.01em;color:#3563A8;margin-bottom:6px;transform:rotate(-3deg);text-shadow:0 3px 0 #24406b;"></div>
        <div id="intro2" style="font-family:'Luckiest Guy',cursive;font-size:clamp(70px,16vw,230px);letter-spacing:0.02em;color:#3E8A6E;line-height:0.92;transform:rotate(2deg);text-shadow:0 6px 0 #232733, 0 10px 18px rgba(35,39,51,0.28);"></div>
      </div>
    </div>
    <p id="hero-eyebrow" style="position:relative;z-index:1;margin:-26px 0 8px;font-size:13px;letter-spacing:0.28em;font-weight:700;color:var(--accent,#3563A8);"></p>
    <div style="position:relative;z-index:1;width:100%;max-width:100%;height:clamp(300px,40vw,440px);margin:0 auto;user-select:none;animation:introReveal 2.3s ease forwards;">
      <canvas id="dario-face-canvas" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(820px,94vw);height:min(820px,94vw);display:block;cursor:grab;touch-action:pan-y;"></canvas>
    </div>
    <h1 id="hero-title" style="position:relative;z-index:1;margin:20px 0 0;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:clamp(38px,7vw,74px);line-height:1.02;letter-spacing:-0.01em;"></h1>
    <p id="hero-sub" style="position:relative;z-index:1;margin:16px auto 0;max-width:540px;font-size:clamp(16px,2vw,19px);line-height:1.6;color:#626875;"></p>
  </section>

  <main id="sections"></main>
</div>

<script src="js/render.js"></script>
<script src="js/field.js"></script>
<script src="js/head.js"></script>
<script src="js/app.js"></script>
</body>
</html>
