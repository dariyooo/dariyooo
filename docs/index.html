<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dario — ML Engineer</title>
<link rel="icon" href="https://avatars.githubusercontent.com/u/51273483?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; }
  a { color: var(--accent, #3563A8); text-decoration: none; }
  a:hover { color: var(--accent-2, #3E8A6E); }
  ::selection { background: var(--accent, #3563A8); color: #fff; }
  .navlink { color: #626875; transition: color .15s ease; }
  .navlink:hover { color: var(--accent, #3563A8); }
  .card-lift { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
  .card-lift:hover { transform: translateY(-5px); box-shadow: 0 16px 34px rgba(35,39,51,0.12); border-color: var(--accent, #3563A8); }
  .os-card { transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease; }
  .os-card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(35,39,51,0.1); border-color: var(--accent, #3563A8); }
  .pgbtn { transition: border-color .15s ease, color .15s ease; }
  .pgbtn:hover { border-color: var(--accent, #3563A8); color: var(--accent, #3563A8); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes introWord { 0%{transform:scale(0.35);opacity:0;filter:blur(4px)} 15%{transform:scale(1);opacity:1;filter:blur(0)} 30%{transform:scale(1.02)} 52%{transform:scale(0.98);opacity:1} 100%{transform:scale(11);opacity:0;filter:blur(2px)} }
  @keyframes introVeil { 0%,52%{opacity:1} 100%{opacity:0;visibility:hidden} }
  @keyframes introReveal { 0%,50%{opacity:0;transform:scale(0.82)} 66%{opacity:1;transform:scale(1.06)} 82%{transform:scale(0.98)} 100%{opacity:1;transform:scale(1)} }
  @media (max-width: 900px) {
    .g-os { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
  }
  @media (max-width: 680px) {
    a.navlink { display: none !important; }
    .g-about, .g-work, .g-os { grid-template-columns: 1fr !important; }
    .g-exp > div { grid-template-columns: 1fr !important; }
    .about-img { width: min(100%, 220px) !important; margin-left: auto !important; margin-right: auto !important; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>
<div id="top" style="--accent:#3563A8; --accent-2:#3E8A6E; cursor:url(data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2232%22%20height%3D%2232%22%3E%3Ctext%20x%3D%223%22%20y%3D%2225%22%20font-family%3D%22sans-serif%22%20font-weight%3D%22900%22%20font-size%3D%2226%22%20fill%3D%22%233563A8%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%221%22%3E%E3%81%A0%3C%2Ftext%3E%3C%2Fsvg%3E)%206%206%2C%20auto; font-family:'Zen Kaku Gothic New',sans-serif; color:#232733; background:#F5F6F8; -webkit-font-smoothing:antialiased; overflow-x:hidden;">

  <nav id="nav" style="position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:15px clamp(18px,5vw,56px);backdrop-filter:blur(10px);background:rgba(245,246,248,0.72);border-bottom:1px solid rgba(35,39,51,0.08);"></nav>

  <!-- ================= HERO ================= -->
  <section style="position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:92px 20px 60px;background:radial-gradient(125% 95% at 50% 12%, #FCFCFD 0%, #F5F6F8 44%, #E9ECF1 100%);">
    <canvas id="kanji-field" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
    <div id="intro-veil" style="position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;pointer-events:none;background:#F5F6F8;animation:introVeil 2.3s ease forwards;">
      <div style="font-family:'Zen Maru Gothic',sans-serif;text-align:center;animation:introWord 2.3s cubic-bezier(.18,.75,.2,1) forwards;">
        <div id="intro1" style="font-size:clamp(22px,4.4vw,52px);font-weight:700;color:var(--accent,#3563A8);margin-bottom:2px;"></div>
        <div id="intro2" style="font-size:clamp(64px,15vw,214px);font-weight:900;letter-spacing:-0.02em;color:#232733;line-height:0.95;"></div>
      </div>
    </div>
    <p id="hero-eyebrow" style="position:relative;z-index:1;margin:0 0 6px;font-size:13px;letter-spacing:0.28em;font-weight:700;color:var(--accent,#3563A8);"></p>
    <div style="position:relative;z-index:1;width:100%;max-width:440px;height:clamp(190px,27vw,260px);margin:4px auto;user-select:none;animation:introReveal 2.3s ease forwards;">
      <canvas id="dario-face-canvas" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(620px,94vw);height:min(620px,94vw);display:block;cursor:grab;touch-action:none;"></canvas>
    </div>
    <h1 id="hero-title" style="position:relative;z-index:1;margin:26px 0 0;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:clamp(38px,7vw,74px);line-height:1.02;letter-spacing:-0.01em;"></h1>
    <p id="hero-sub" style="position:relative;z-index:1;margin:16px auto 0;max-width:540px;font-size:clamp(16px,2vw,19px);line-height:1.6;color:#626875;"></p>
  </section>

  <main id="sections"></main>
</div>

<script>
const KICK = 'margin:0 0 12px;font-size:13px;letter-spacing:0.2em;font-weight:700;color:var(--accent,#3563A8);';
const H2 = "font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(28px,4.4vw,46px);letter-spacing:-0.01em;";
const SECPAD = 'max-width:1120px;margin:0 auto;padding:clamp(70px,10vw,120px) clamp(20px,5vw,56px);';

function statChip(s) {
  return `<span style="display:inline-flex;align-items:baseline;gap:5px;padding:6px 12px;border-radius:10px;background:#EEF1F6;border:1px solid rgba(35,39,51,0.06);"><span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;color:#232733;">${s.value}</span><span style="font-size:11px;font-weight:600;color:#949AA6;">${s.label}</span></span>`;
}
function workIcon(icon) {
  if (icon && icon.type === 'img') return `<img src="${icon.src}" alt="" style="flex:none;width:44px;height:44px;border-radius:12px;object-fit:contain;display:block;">`;
  return `<span style="flex:none;display:grid;place-items:center;width:44px;height:44px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:38px;color:#232733;">${(icon && icon.char) || ''}</span>`;
}

function renderNav(c) {
  const links = c.nav.map(n => `<a href="${n.href}" class="navlink" style="font-size:15px;font-weight:500;">${n.label}</a>`).join('');
  document.getElementById('nav').innerHTML = `
    <a href="#top" style="display:flex;align-items:center;gap:11px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:20px;color:#232733;">
      <img src="${c.brand.avatar}" alt="${c.brand.name}" style="width:34px;height:34px;border-radius:11px;object-fit:cover;display:block;box-shadow:0 3px 0 rgba(35,39,51,0.15);">
      ${c.brand.name}
    </a>
    <div style="display:flex;align-items:center;gap:clamp(12px,2.4vw,30px);">
      ${links}
      <a href="${c.brand.githubUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:999px;background:#232733;color:#F5F6F8;font-weight:700;font-size:15px;">GitHub &#8599;</a>
    </div>`;
}

function renderHero(c) {
  document.getElementById('hero-eyebrow').textContent = c.hero.eyebrow;
  document.getElementById('intro1').textContent = c.hero.intro1;
  document.getElementById('intro2').textContent = c.hero.intro2;
  document.getElementById('hero-title').textContent = c.hero.title;
  document.getElementById('hero-sub').textContent = c.hero.subtitle;
}

function aboutSection(a) {
  return `<section id="about" class="g-about" style="${SECPAD}display:grid;grid-template-columns:0.85fr 1.15fr;gap:clamp(30px,5vw,70px);align-items:center;">
    <div style="position:relative;">
      <div class="about-img" style="position:relative;width:min(100%,300px);aspect-ratio:1;border-radius:28px;overflow:hidden;background:#E9ECF1;box-shadow:0 20px 50px rgba(35,39,51,0.14);border:1px solid rgba(35,39,51,0.08);">
        <img src="${a.avatar}" alt="portrait" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      <span style="position:absolute;transform:rotate(-8deg);right:-6px;bottom:-14px;display:grid;place-items:center;width:74px;height:74px;border-radius:20px;background:var(--accent,#3563A8);color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:32px;box-shadow:0 8px 20px rgba(53,99,168,0.35);">${a.badge}</span>
    </div>
    <div>
      <p style="${KICK}">${a.num} &middot; ${a.kicker}</p>
      <h2 style="margin:0 0 22px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(26px,3.8vw,40px);line-height:1.18;letter-spacing:-0.01em;">${a.heading}</h2>
      ${a.paras.map((p, i) => `<p style="margin:0 0 ${i < a.paras.length - 1 ? '16px' : '0'};font-size:17px;line-height:1.72;color:#626875;">${p}</p>`).join('')}
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:26px;">
        ${a.tags.map(t => `<span style="display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.1);font-size:14px;font-weight:600;">${t}</span>`).join('')}
      </div>
    </div>
  </section>`;
}

function workSection(w) {
  const cards = w.items.map(it => `
    <a href="${it.url}" target="_blank" rel="noopener" class="card-lift" style="display:flex;flex-direction:column;gap:16px;padding:28px;border-radius:22px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.09);color:#232733;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#626875;"><span style="width:11px;height:11px;border-radius:50%;background:${it.langColor};"></span>${it.lang}</span>
        <span style="font-size:13px;font-weight:700;color:#949AA6;">${it.stars}</span>
      </div>
      <div style="display:flex;align-items:center;gap:11px;">
        ${workIcon(it.icon)}
        <h3 style="margin:0;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:23px;">${it.name}</h3>
      </div>
      <p style="margin:0;font-size:15px;line-height:1.6;color:#626875;flex:1;">${it.desc}</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${it.stats.map(statChip).join('')}</div>
      <span style="font-size:14px;font-weight:700;color:var(--accent,#3563A8);">${it.footer}</span>
    </a>`).join('');
  return `<section id="work" style="background:#E9ECF1;border-top:1px solid rgba(35,39,51,0.07);border-bottom:1px solid rgba(35,39,51,0.07);">
    <div style="${SECPAD}">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:44px;">
        <div>
          <p style="${KICK}">${w.num} &middot; ${w.kicker}</p>
          <h2 style="margin:0;${H2}">${w.heading}</h2>
        </div>
        <a href="${w.linkUrl}" target="_blank" rel="noopener" style="font-weight:700;font-size:15px;">${w.linkLabel}</a>
      </div>
      <div class="g-work" style="display:grid;grid-template-columns:repeat(2,1fr);gap:22px;">${cards}</div>
    </div>
  </section>`;
}

function toolkitSection(t) {
  const cats = t.categories.map(cat => `
    <div style="display:flex;flex-direction:column;gap:16px;padding:28px;border-radius:20px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.09);box-shadow:0 1px 0 rgba(35,39,51,0.03);">
      <div style="display:flex;align-items:center;gap:13px;">
        <span style="flex:none;display:grid;place-items:center;width:46px;height:46px;border-radius:14px;background:${cat.markBg};color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:22px;">${cat.mark}</span>
        <div style="display:flex;flex-direction:column;gap:1px;">
          <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:19px;line-height:1.15;color:#232733;">${cat.en}</span>
          <span style="font-size:11px;font-weight:700;letter-spacing:0.14em;color:#949AA6;">${cat.jp}</span>
        </div>
      </div>
      <p style="margin:0;font-size:14.5px;line-height:1.55;color:#626875;">${cat.desc}</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;padding-top:4px;">
        ${cat.items.map(tool => `<span style="padding:6px 13px;border-radius:999px;background:#EEF1F6;border:1px solid rgba(35,39,51,0.06);font-size:13px;font-weight:600;color:#3A4150;">${tool}</span>`).join('')}
      </div>
    </div>`).join('');
  return `<section id="toolkit" style="${SECPAD}">
    <p style="${KICK}">${t.num} &middot; ${t.kicker}</p>
    <h2 style="margin:0 0 16px;${H2}max-width:640px;">${t.heading}</h2>
    <p style="margin:0 0 44px;max-width:580px;font-size:17px;line-height:1.6;color:#626875;">${t.intro}</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;">${cats}</div>
  </section>`;
}

function experienceSection(e) {
  const roles = e.roles.map(r => `
    <div style="display:grid;grid-template-columns:minmax(150px,210px) 1fr;gap:clamp(16px,3vw,32px);padding:28px;border-radius:20px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.09);">
      <div>
        <div style="font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:18px;color:#232733;">${r.company}</div>
        <div style="font-size:13px;font-weight:600;color:#949AA6;margin-top:3px;">${r.meta}</div>
      </div>
      <div>
        <div style="font-weight:700;font-size:17px;color:#232733;">${r.title}</div>
        <ul style="margin:10px 0 0;padding-left:18px;color:#626875;font-size:15px;line-height:1.6;">${r.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
      </div>
    </div>`).join('');
  return `<section id="experience" style="${SECPAD}">
    <p style="${KICK}">${e.num} &middot; ${e.kicker}</p>
    <h2 style="margin:0 0 44px;${H2}">${e.heading}</h2>
    <div class="g-exp" style="display:flex;flex-direction:column;gap:18px;">${roles}</div>
  </section>`;
}

function creditsSection(cr) {
  const langs = cr.languages.map(l => `
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="font-weight:700;font-size:16px;">${l.name}</span><span style="font-size:13px;font-weight:600;color:#949AA6;">${l.meta}</span></div>
      <div style="height:8px;border-radius:999px;background:#DEE3EA;overflow:hidden;"><div style="height:100%;width:${l.level}%;border-radius:999px;background:var(--accent,#3563A8);"></div></div>
    </div>`).join('');
  const achs = cr.achievements.map(a => `
    <div style="display:flex;gap:14px;align-items:flex-start;">
      <span style="flex:none;display:grid;place-items:center;width:34px;height:34px;border-radius:10px;background:var(--accent-2,#3E8A6E);color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:15px;">${a.mark}</span>
      <div>
        <div style="font-weight:700;font-size:16px;line-height:1.3;">${a.title}</div>
        <div style="font-size:14px;color:#626875;line-height:1.45;">${a.desc}</div>
      </div>
    </div>`).join('');
  return `<section id="credits" style="${SECPAD}">
    <p style="${KICK}">${cr.num} &middot; ${cr.kicker}</p>
    <h2 style="margin:0 0 44px;${H2}">${cr.heading}</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(32px,5vw,64px);">
      <div>
        <h3 style="margin:0 0 24px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:20px;">Languages <span style="color:#949AA6;font-weight:500;">語学</span></h3>
        <div style="display:flex;flex-direction:column;gap:20px;">${langs}</div>
      </div>
      <div>
        <h3 style="margin:0 0 24px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:20px;">Achievements <span style="color:#949AA6;font-weight:500;">実績</span></h3>
        <div style="display:flex;flex-direction:column;gap:16px;">${achs}</div>
      </div>
    </div>
  </section>`;
}

function openSourceSection(o) {
  return `<section id="opensource" style="background:#E9ECF1;border-top:1px solid rgba(35,39,51,0.07);border-bottom:1px solid rgba(35,39,51,0.07);">
    <div style="${SECPAD}">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:14px;">
        <div>
          <p style="${KICK}">${o.num} &middot; ${o.kicker}</p>
          <h2 style="margin:0;${H2}">${o.heading}</h2>
        </div>
        <a href="${o.linkUrl}" target="_blank" rel="noopener" style="font-weight:700;font-size:15px;">${o.linkLabel}</a>
      </div>
      <p style="margin:0 0 36px;max-width:620px;font-size:17px;line-height:1.6;color:#626875;">${o.intro}</p>
      <div id="os-body"></div>
    </div>
  </section>`;
}

function contactSection(c) {
  const btns = c.buttons.map(b => b.primary
    ? `<a href="${b.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:9px;padding:15px 26px;border-radius:999px;background:var(--accent,#3563A8);color:#fff;font-weight:700;font-size:16px;">${b.label}</a>`
    : `<a href="${b.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:9px;padding:15px 26px;border-radius:999px;background:transparent;border:1.5px solid rgba(245,246,248,0.35);color:#F5F6F8;font-weight:700;font-size:16px;">${b.label}</a>`).join('');
  return `<section id="contact" style="position:relative;overflow:hidden;background:#232733;color:#F5F6F8;">
    <span style="position:absolute;top:-30px;right:2%;font-size:clamp(160px,26vw,340px);font-weight:900;color:rgba(53,99,168,0.14);font-family:'Zen Maru Gothic',sans-serif;pointer-events:none;line-height:1;">${c.watermark}</span>
    <div style="position:relative;max-width:1120px;margin:0 auto;padding:clamp(80px,11vw,140px) clamp(20px,5vw,56px);">
      <p style="${KICK}">${c.num} &middot; ${c.kicker}</p>
      <h2 style="margin:0 0 30px;font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:clamp(34px,6vw,68px);line-height:1.05;letter-spacing:-0.01em;max-width:760px;">${c.heading}</h2>
      <div style="display:flex;flex-wrap:wrap;gap:14px;">${btns}</div>
    </div>
    <div style="position:relative;border-top:1px solid rgba(245,246,248,0.12);">
      <div style="max-width:1120px;margin:0 auto;padding:22px clamp(20px,5vw,56px);display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;font-size:13px;color:rgba(245,246,248,0.55);">
        <span>${c.footerLeft}</span>
        <span>${c.footerRight}</span>
      </div>
    </div>
  </section>`;
}

/* ---------- Open-source (live GitHub) ---------- */
const OS = { state: 'loading', contribs: [], total: 0, repoCount: 0, page: 0, error: '', cfg: null };

async function fetchContribs(o) {
  OS.cfg = o;
  renderOS();
  try {
    const q = encodeURIComponent('type:pr author:' + o.githubUser + ' -user:' + o.githubUser);
    const res = await fetch('https://api.github.com/search/issues?q=' + q + '&sort=created&order=desc&per_page=40', { headers: { Accept: 'application/vnd.github+json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const repos = new Set();
    OS.contribs = (data.items || []).map(it => {
      const repo = (it.repository_url || '').replace('https://api.github.com/repos/', '');
      repos.add(repo);
      return { repo, title: it.title, url: it.html_url, number: it.number, date: (it.created_at || '').slice(0, 7).replace('-', '.') };
    });
    OS.total = data.total_count || OS.contribs.length;
    OS.repoCount = repos.size;
    OS.state = OS.contribs.length ? 'ok' : 'empty';
  } catch (e) { OS.state = 'error'; OS.error = e.message; }
  renderOS();
}

function renderOS() {
  const el = document.getElementById('os-body');
  if (!el) return;
  const o = OS.cfg || {};
  const seeAll = `<a href="${o.linkUrl}" target="_blank" rel="noopener" style="font-weight:700;">See them on GitHub &#8599;</a>`;
  if (OS.state === 'loading') {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:12px;color:#949AA6;font-size:15px;font-weight:500;"><span style="width:16px;height:16px;border-radius:50%;border:2px solid rgba(35,39,51,0.18);border-top-color:var(--accent,#3563A8);display:inline-block;animation:spin 0.8s linear infinite;"></span>Fetching contributions from GitHub&hellip;</div>`;
    return;
  }
  if (OS.state === 'empty') { el.innerHTML = `<p style="margin:0;font-size:16px;color:#626875;">No external pull requests came back (GitHub's API may be rate-limiting anonymous requests). ${seeAll}</p>`; return; }
  if (OS.state === 'error') { el.innerHTML = `<p style="margin:0;font-size:16px;color:#626875;">Couldn't reach GitHub right now (${OS.error}). ${seeAll}</p>`; return; }
  const size = o.pageSize || 9;
  const pageTotal = Math.max(1, Math.ceil(OS.contribs.length / size));
  const page = Math.min(OS.page, pageTotal - 1);
  const slice = OS.contribs.slice(page * size, page * size + size);
  const cards = slice.map(c => `
    <a href="${c.url}" target="_blank" rel="noopener" class="os-card" style="display:flex;flex-direction:column;gap:10px;padding:20px 22px;border-radius:16px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.09);color:#232733;">
      <span style="font-size:13px;font-weight:700;color:#626875;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.repo}</span>
      <span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:500;font-size:16px;line-height:1.4;color:#232733;">${c.title}</span>
      <span style="font-size:12px;font-weight:600;color:#949AA6;">#${c.number} &middot; ${c.date}</span>
    </a>`).join('');
  const pager = pageTotal > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:18px;margin-top:34px;">
      <button id="os-prev" class="pgbtn" style="padding:10px 18px;border-radius:999px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.14);color:#232733;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;">&larr; Prev</button>
      <span style="font-size:14px;font-weight:700;color:#626875;">${page + 1} / ${pageTotal}</span>
      <button id="os-next" class="pgbtn" style="padding:10px 18px;border-radius:999px;background:#FFFFFF;border:1px solid rgba(35,39,51,0.14);color:#232733;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;">Next &rarr;</button>
    </div>` : '';
  el.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:26px;margin-bottom:30px;">
      <div style="display:flex;flex-direction:column;gap:2px;"><span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:34px;color:var(--accent,#3563A8);line-height:1;">${OS.total}</span><span style="font-size:13px;font-weight:600;color:#626875;">pull requests</span></div>
      <div style="display:flex;flex-direction:column;gap:2px;"><span style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:34px;color:#232733;line-height:1;">${OS.repoCount}</span><span style="font-size:13px;font-weight:600;color:#626875;">repositories</span></div>
    </div>
    <div class="g-os" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;">${cards}</div>${pager}`;
  const prev = document.getElementById('os-prev'), next = document.getElementById('os-next');
  if (prev) prev.onclick = () => { OS.page = Math.max(0, page - 1); renderOS(); };
  if (next) next.onclick = () => { OS.page = Math.min(pageTotal - 1, page + 1); renderOS(); };
}

/* ---------- 3D head ---------- */
class Head {
  constructor(canvas, model, texture) { this._canvas = canvas; this.modelUrl = model; this.textureUrl = texture; }

  init3D() {
    const THREE = window.THREE;
    if (!THREE || this._inited) return;
    this._inited = true; this.THREE = THREE;
    this.faceYaw = Math.PI; this.facePitch = 0; this.faceRoll = 0;
    const canvas = this._canvas; this.grabbing = false;
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearAlpha(0); this.renderer = renderer;
    const scene = new THREE.Scene(); this.scene = scene;
    const cam = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    cam.position.set(0, 0, 11); this.cam = cam;
    scene.add(new THREE.AmbientLight(0xffffff, 0.78));
    const key = new THREE.DirectionalLight(0xffffff, 0.95); key.position.set(3, 5, 5); scene.add(key);
    const fill = new THREE.DirectionalLight(0x99b4ff, 0.35); fill.position.set(-4, -1, 2); scene.add(fill);
    this.R = 1.35;
    this.ray = new THREE.Raycaster();
    this.dragStart = new THREE.Vector3();
    this.dragCur = new THREE.Vector3();
    this.resize3D();
    this._onResize = () => this.resize3D();
    window.addEventListener('resize', this._onResize);
    canvas.addEventListener('pointerdown', e => this.onDown3(e));
    window.addEventListener('pointermove', e => this.onMove3(e));
    window.addEventListener('pointerup', () => this.onUp3());
    window.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') this.resetHead(); });
    this.loadModel(this.modelUrl, this.textureUrl);
    this.start();
  }

  loadModel(url, texUrl) {
    const THREE = this.THREE;
    fetch(url).then(r => r.text()).then(txt => {
      const V = [], VT = [], posArr = [], uvArr = [];
      for (const ln of txt.split('\n')) {
        if (ln[0] === 'v' && ln[1] === ' ') { const p = ln.split(/\s+/); V.push([+p[1], +p[2], +p[3]]); }
        else if (ln[0] === 'v' && ln[1] === 't') { const p = ln.split(/\s+/); VT.push([+p[1], +p[2]]); }
        else if (ln[0] === 'f' && ln[1] === ' ') {
          const p = ln.trim().split(/\s+/).slice(1).map(tok => { const a = tok.split('/'); return [parseInt(a[0]) - 1, a[1] ? parseInt(a[1]) - 1 : -1]; });
          for (let k = 1; k < p.length - 1; k++) {
            for (const vt of [p[0], p[k], p[k + 1]]) {
              const v = V[vt[0]]; posArr.push(v[0], v[1], v[2]);
              const t = vt[1] >= 0 ? VT[vt[1]] : null; uvArr.push(t ? t[0] : 0, t ? t[1] : 0);
            }
          }
        }
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posArr), 3));
      geo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array(uvArr), 2));
      geo.computeBoundingBox();
      const c = new THREE.Vector3(); geo.boundingBox.getCenter(c); geo.translate(-c.x, -c.y, -c.z);
      geo.computeBoundingSphere();
      const s = this.R / geo.boundingSphere.radius; geo.scale(s, s, s);
      geo.computeVertexNormals();
      const mat = new THREE.MeshStandardMaterial({ roughness: 0.85, metalness: 0 });
      if (texUrl) { const t = new THREE.TextureLoader().load(texUrl); t.flipY = true; mat.map = t; }
      if (this.mesh) this.scene.remove(this.mesh);
      this.mesh = new THREE.Mesh(geo, mat);
      this.faceYaw = 0; this.facePitch = -0.3; this.faceRoll = 0;
      this.scene.add(this.mesh);
      this.setupDeform(geo);
      this.resize3D();
    }).catch(e => console.warn('model load failed', e));
  }

  setupDeform(geometry) {
    const pos = geometry.attributes.position;
    pos.setUsage(this.THREE.DynamicDrawUsage);
    this.basePos = Float32Array.from(pos.array);
    this.disp = new Float32Array(pos.count * 3);
    this.vel = new Float32Array(pos.count * 3);
    this.wt = new Float32Array(pos.count);
    this.grabDisp = new Float32Array(pos.count * 3);
  }

  resize3D() {
    const r = this._canvas.getBoundingClientRect();
    const w = r.width || 320, h = r.height || 320;
    this.renderer.setSize(w, h, false);
    this.cam.aspect = w / h; this.cam.updateProjectionMatrix();
  }

  ndc(e) {
    const r = this._canvas.getBoundingClientRect();
    return { x: ((e.clientX - r.left) / r.width) * 2 - 1, y: -((e.clientY - r.top) / r.height) * 2 + 1 };
  }

  onDown3(e) {
    if (!this.mesh) return;
    const THREE = this.THREE;
    this.ray.setFromCamera(this.ndc(e), this.cam);
    const hit = this.ray.intersectObject(this.mesh)[0];
    if (!hit) return;
    this.grabbing = true;
    const n = this.cam.getWorldDirection(new THREE.Vector3());
    this.plane = new THREE.Plane().setFromNormalAndCoplanarPoint(n, hit.point.clone());
    this.dragStart.copy(hit.point); this.dragCur.copy(hit.point);
    const local = this.mesh.worldToLocal(hit.point.clone());
    const sigma = this.R * 0.7, denom = 2 * sigma * sigma, bp = this.basePos;
    for (let i = 0; i < this.wt.length; i++) {
      const dx = bp[i * 3] - local.x, dy = bp[i * 3 + 1] - local.y, dz = bp[i * 3 + 2] - local.z;
      this.wt[i] = Math.exp(-(dx * dx + dy * dy + dz * dz) / denom);
    }
    this.ensureAudio();
    this.grabDisp.set(this.disp);
    this._canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }

  onMove3(e) {
    const r = this._canvas.getBoundingClientRect();
    this._pnx = Math.max(-1.4, Math.min(1.4, ((e.clientX - r.left) / r.width) * 2 - 1));
    this._pny = Math.max(-1.4, Math.min(1.4, ((e.clientY - r.top) / r.height) * 2 - 1));
    this._lastMoveT = performance.now();
    if (this._lastMx != null) this._pvx = e.clientX - this._lastMx;
    this._lastMx = e.clientX;
    if (!this.grabbing) return;
    this.ray.setFromCamera(this.ndc(e), this.cam);
    const p = new this.THREE.Vector3();
    if (this.ray.ray.intersectPlane(this.plane, p)) this.dragCur.copy(p);
  }

  onUp3() {
    if (!this.grabbing) return;
    this.grabbing = false;
    const flick = Math.max(-1.2, Math.min(1.2, (this._pvx || 0) * 0.010));
    this._spinV = (this._spinV || 0) + flick;
    let m = 0; const ds = this.disp; if (ds) for (let i = 0; i < ds.length; i++) { const a = Math.abs(ds[i]); if (a > m) m = a; }
    if (m > 0.12) this.boing(Math.min(1, m / 2.4));
    if (Math.abs(flick) > 0.18) this.whoosh(Math.min(1, Math.abs(flick) / 0.9));
    this._pvx = 0; this._lastMx = null;
    this._canvas.style.cursor = 'grab';
  }

  ensureAudio() {
    try {
      if (!this._ac) this._ac = new (window.AudioContext || window.webkitAudioContext)();
      if (this._ac.state === 'suspended') this._ac.resume();
    } catch (e) {}
  }

  boing(amt) {
    const ac = this._ac; if (!ac) return; const t = ac.currentTime;
    const dur = 0.46 + amt * 0.14;
    const N = 72, base = 430 + amt * 180;
    const curve = new Float32Array(N), curve2 = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      const x = i / (N - 1);
      const env = Math.exp(-3.4 * x);
      const wob = Math.sin(x * Math.PI * 2 * 6.5) * env;
      const center = base * Math.exp(-1.35 * x) + 70;
      const f = Math.max(50, center * (1 + 0.6 * wob));
      curve[i] = f; curve2[i] = f * 2;
    }
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.setValueCurveAtTime(curve, t, dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.min(0.34, 0.15 + amt * 0.2), t + 0.014);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'sine'; o2.frequency.setValueCurveAtTime(curve2, t, dur);
    g2.gain.setValueAtTime(0.0001, t);
    g2.gain.exponentialRampToValueAtTime(Math.min(0.12, 0.05 + amt * 0.08), t + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.85);
    o.connect(g).connect(ac.destination); o2.connect(g2).connect(ac.destination);
    o.start(t); o2.start(t); o.stop(t + dur + 0.02); o2.stop(t + dur + 0.02);
  }

  whoosh(amt) {
    const ac = this._ac; if (!ac) return; const t = ac.currentTime; const dur = 0.28 + amt * 0.26;
    const n = Math.floor(ac.sampleRate * dur), buf = ac.createBuffer(1, n, ac.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(); src.buffer = buf;
    const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.1;
    bp.frequency.setValueAtTime(360, t);
    bp.frequency.exponentialRampToValueAtTime(1400 + amt * 1200, t + dur * 0.5);
    bp.frequency.exponentialRampToValueAtTime(300, t + dur);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.min(0.22, 0.07 + amt * 0.18), t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp).connect(g).connect(ac.destination);
    src.start(t); src.stop(t + dur);
  }

  resetHead() {
    if (!this.disp) return;
    this.disp.fill(0); this.vel.fill(0); this.grabbing = false;
    this._canvas.style.cursor = 'grab';
  }

  step3D(dt, t) {
    if (!this.mesh) return;
    const mesh = this.mesh;
    if (!this.grabbing) {
      const idlePtr = (t - (this._lastMoveT || 0)) < 1600;
      if (!idlePtr && t > (this._nextGlance || 0)) {
        this._nextGlance = t + 2600 + Math.random() * 3500;
        this._autoNx = (Math.random() * 2 - 1) * 0.8;
        this._autoNy = (Math.random() * 2 - 1) * 0.45;
        if (Math.random() < 0.5) this._squishT = t;
      }
      const nx = idlePtr ? (this._pnx || 0) : (this._autoNx || 0);
      const ny = idlePtr ? (this._pny || 0) : (this._autoNy || 0);
      const ty = this.faceYaw + nx * 0.6;
      const tx = this.facePitch + ny * 0.38;
      this._ry = this._ry == null ? ty : this._ry + (ty - this._ry) * 0.07;
      this._rx = this._rx == null ? tx : this._rx + (tx - this._rx) * 0.07;
      this._spinV = (this._spinV || 0) * 0.955;
      this._spinA = (this._spinA || 0) + this._spinV;
      if (Math.abs(this._spinV) < 0.012) {
        const tgt = Math.round(this._spinA / (Math.PI * 2)) * (Math.PI * 2);
        this._spinA += (tgt - this._spinA) * 0.05;
      }
      mesh.rotation.y = this._ry + this._spinA + Math.sin(t * 0.0011) * 0.04;
      mesh.rotation.x = this._rx + Math.sin(t * 0.00058) * 0.03;
      mesh.rotation.z = this.faceRoll + Math.sin(t * 0.0004) * 0.02;
      let sq = 0;
      if (this._squishT) { const e = (t - this._squishT) / 620; if (e >= 1) this._squishT = 0; else sq = Math.sin(e * Math.PI * 2) * 0.11 * (1 - e); }
      const br = 1 + Math.sin(t * 0.0016) * 0.015;
      mesh.scale.set(br * (1 + sq), br * (1 - sq * 0.7), br * (1 + sq));
    } else {
      mesh.scale.set(1, 1, 1);
    }
    mesh.updateMatrixWorld();
    let ldx = 0, ldy = 0, ldz = 0;
    if (this.grabbing) {
      const a = mesh.worldToLocal(this.dragStart.clone());
      const b = mesh.worldToLocal(this.dragCur.clone());
      ldx = b.x - a.x; ldy = b.y - a.y; ldz = b.z - a.z;
      const L = Math.hypot(ldx, ldy, ldz), max = 1.8;
      if (L > max) { const s = max / L; ldx *= s; ldy *= s; ldz *= s; }
    }
    const K = 0.45, D = 0.68, pos = mesh.geometry.attributes.position, bp = this.basePos, ds = this.disp, ve = this.vel, wt = this.wt, gd = this.grabDisp;
    const grab = this.grabbing;
    for (let i = 0; i < wt.length; i++) {
      const idx = i * 3, w = wt[i];
      if (grab) {
        const tx = gd[idx] + w * ldx, ty = gd[idx + 1] + w * ldy, tz = gd[idx + 2] + w * ldz;
        ve[idx] = (ve[idx] + (tx - ds[idx]) * K) * D; ds[idx] += ve[idx];
        ve[idx + 1] = (ve[idx + 1] + (ty - ds[idx + 1]) * K) * D; ds[idx + 1] += ve[idx + 1];
        ve[idx + 2] = (ve[idx + 2] + (tz - ds[idx + 2]) * K) * D; ds[idx + 2] += ve[idx + 2];
      } else {
        ve[idx] = (ve[idx] + (0 - ds[idx]) * 0.11) * 0.90; ds[idx] += ve[idx];
        ve[idx + 1] = (ve[idx + 1] + (0 - ds[idx + 1]) * 0.11) * 0.90; ds[idx + 1] += ve[idx + 1];
        ve[idx + 2] = (ve[idx + 2] + (0 - ds[idx + 2]) * 0.11) * 0.90; ds[idx + 2] += ve[idx + 2];
      }
      pos.array[idx] = bp[idx] + ds[idx];
      pos.array[idx + 1] = bp[idx + 1] + ds[idx + 1];
      pos.array[idx + 2] = bp[idx + 2] + ds[idx + 2];
    }
    pos.needsUpdate = true;
    mesh.geometry.computeVertexNormals();
  }

  start() {
    if (this._raf) return;
    let last = performance.now();
    const loop = t => {
      const dt = Math.min(0.05, (t - last) / 1000); last = t;
      this.step3D(dt, t);
      if (this.renderer) this.renderer.render(this.scene, this.cam);
      if (window.__field) window.__field.step(dt);
      this._raf = requestAnimationFrame(loop);
    };
    this._raf = requestAnimationFrame(loop);
  }
}

/* ---------- Floating kanji field ---------- */
class Field {
  constructor(canvas, faceCanvas) { this.field = canvas; this._face = faceCanvas; this.fctx = canvas.getContext('2d'); }
  init() {
    this.chars = ['学', '字', '読', '書', '漢', '語', '文', '本', '日', 'か', 'ん', 'じ', 'だ', 'ダ'];
    this.parts = [];
    this.resize();
    window.addEventListener('resize', () => this.resize());
    for (let i = 0; i < 16; i++) this.parts.push(this.spawn(true, (i / 16) * Math.PI * 2));
  }
  resize() {
    const r = this.field.getBoundingClientRect();
    this.fdpr = Math.min(window.devicePixelRatio || 1, 2);
    this.fw = r.width || 800; this.fh = r.height || 600;
    this.field.width = Math.round(this.fw * this.fdpr);
    this.field.height = Math.round(this.fh * this.fdpr);
  }
  center() {
    const wrap = this._face ? this._face.parentElement : null;
    const fr = this.field.getBoundingClientRect();
    if (wrap) {
      const wr = wrap.getBoundingClientRect();
      return { x: wr.left + wr.width / 2 - fr.left, y: wr.top + wr.height / 2 - fr.top, r: Math.min(wr.width, wr.height) / 2 };
    }
    return { x: this.fw / 2, y: this.fh / 2, r: 150 };
  }
  spawn(initial, slot) {
    const c = this.center();
    const reach = Math.hypot(this.fw, this.fh) / 2;
    if (slot == null) slot = Math.random() * Math.PI * 2;
    return {
      char: this.chars[(Math.random() * this.chars.length) | 0],
      slot, angle: slot + (Math.random() - 0.5) * 0.26,
      dist: c.r + 8 + (initial ? Math.random() * reach : 0),
      vMax: 38 + Math.random() * 32, rot: (Math.random() - 0.5) * 0.6, spin: (Math.random() - 0.5) * 0.25,
      size: 30 + Math.random() * 82, wobAmp: 6 + Math.random() * 16, wobSpeed: 0.5 + Math.random() * 0.9,
      wobPhase: Math.random() * Math.PI * 2, tone: Math.random(),
    };
  }
  step(dt) {
    if (!this.fctx) return;
    const ctx = this.fctx, c = this.center();
    ctx.setTransform(this.fdpr, 0, 0, this.fdpr, 0, 0);
    ctx.clearRect(0, 0, this.fw, this.fh);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const maxR = Math.hypot(this.fw, this.fh) / 2 + 120;
    for (const p of this.parts) {
      const rr = Math.max(p.dist, c.r);
      const v = Math.max(6, p.vMax * Math.pow(c.r / rr, 0.85));
      p.dist += v * dt;
      const df = Math.min(2.4, p.dist / c.r);
      p.rot += (p.spin / df) * dt; p.wobPhase += (p.wobSpeed / df) * dt;
      const dirX = Math.cos(p.angle), dirY = Math.sin(p.angle);
      const wob = Math.sin(p.wobPhase) * p.wobAmp * df;
      const x = c.x + dirX * p.dist - dirY * wob;
      const y = c.y + dirY * p.dist + dirX * wob;
      if (p.dist > maxR || x < -140 || x > this.fw + 140 || y < -140 || y > this.fh + 140) { Object.assign(p, this.spawn(false, p.slot)); continue; }
      const fadeIn = Math.min(1, (p.dist - c.r) / 80);
      const edge = Math.min(x, this.fw - x, y, this.fh - y);
      const fadeOut = Math.max(0, Math.min(1, edge / 100));
      const alpha = Math.max(0, fadeIn * fadeOut) * 0.15;
      if (alpha <= 0.003) continue;
      const col = p.tone < 0.5 ? '53,99,168' : (p.tone < 0.8 ? '62,138,110' : '35,39,51');
      ctx.save(); ctx.translate(x, y); ctx.rotate(p.rot);
      ctx.font = `900 ${p.size}px 'Zen Maru Gothic','Zen Kaku Gothic New',sans-serif`;
      ctx.fillStyle = `rgba(${col},${alpha.toFixed(3)})`;
      ctx.fillText(p.char, 0, 0); ctx.restore();
    }
  }
}

/* ---------- boot ---------- */
async function boot() {
  let c;
  try {
    const res = await fetch('content.json', { cache: 'no-store' });
    c = await res.json();
  } catch (e) {
    document.getElementById('sections').innerHTML = '<p style="max-width:600px;margin:120px auto;text-align:center;color:#626875;font-size:16px;">Could not load <b>content.json</b>. Serve this folder over HTTP (e.g. <code>python3 -m http.server</code>) rather than opening the file directly.</p>';
    return;
  }
  const top = document.getElementById('top');
  top.style.setProperty('--accent', c.theme.accent);
  top.style.setProperty('--accent-2', c.theme.accent2);
  renderNav(c);
  renderHero(c);
  document.getElementById('sections').innerHTML =
    aboutSection(c.about) + workSection(c.work) + toolkitSection(c.toolkit) +
    experienceSection(c.experience) + creditsSection(c.credits) +
    openSourceSection(c.opensource) + contactSection(c.contact);
  fetchContribs(c.opensource);

  const faceCanvas = document.getElementById('dario-face-canvas');
  const fieldCanvas = document.getElementById('kanji-field');
  window.__field = new Field(fieldCanvas, faceCanvas); window.__field.init();
  const head = new Head(faceCanvas, c.character.model, c.character.texture);
  let tries = 0;
  (function waitThree() {
    if (window.THREE) head.init3D();
    else if (tries++ < 400) requestAnimationFrame(waitThree);
  })();
}
boot();
</script>
</body>
</html>
