name: Update GitHub stats

on:
  schedule:
    - cron: '17 5 * * *' # daily, 05:17 UTC
  workflow_dispatch:
  push:
    paths:
      - 'docs/data/content.json'
      - 'scripts/update-stats.mjs'
      - '.github/workflows/update-stats.yml'

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/update-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/data/content.json; then
            echo "No star changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh GitHub stars" -- docs/data/content.json
          git push
